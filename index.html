<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện Tập Đọc Nốt Nhạc</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 30px;
            background-color: #f4f6f8;
            padding: 0 15px;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
            font-size: 32px;
        }

        /* Vùng chứa khuông nhạc */
        .staff-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin-bottom: 50px;
            padding: 20px 0;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border-radius: 8px;
        }

        .row {
            position: relative;
            width: 100%;
        }

        .line {
            height: 2px;
            background-color: #d1d5db;
        }

        .line.main-line {
            background-color: #000000;
        }

        .space {
            height: 14px;
            background-color: transparent;
        }

        .clef {
            position: absolute;
            font-size: 110px;
            font-family: "Times New Roman", serif;
            left: 30px;
            top: -3px; 
            pointer-events: none;
            color: #000;
        }

        .note {
            width: 16px;
            height: 12px;
            border: 2px solid #000;
            border-radius: 50%;
            background: white;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .note.stem-up::after {
            content: '';
            position: absolute;
            width: 2px;
            height: 35px;
            background: black;
            right: -2px;
            bottom: 4px;
        }

        .note.stem-down::after {
            content: '';
            position: absolute;
            width: 2px;
            height: 35px;
            background: black;
            left: -2px;
            top: 4px;
        }

        .controls {
            display: flex;
            gap: 30px; 
            margin-bottom: 30px;
            flex-wrap: wrap; 
            justify-content: center;
            width: 100%;
            max-width: 800px;
        }

        button {
            padding: 20px 20px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 15px;
            color: white;
            transition: all 0.1s ease-in-out;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            flex: 1; 
            min-width: 250px; 
        }

        button:active {
            transform: scale(0.95);
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        #btn-generate {
            background-color: #3b82f6;
        }

        #btn-generate:hover {
            background-color: #2563eb;
        }

        #btn-result {
            background-color: #10b981;
        }

        #btn-result:hover {
            background-color: #059669;
        }

        /* Style cho tính năng Auto */
        .auto-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 800px;
            background: #e2e8f0;
            padding: 20px;
            border-radius: 15px;
        }

        .auto-controls input {
            padding: 15px;
            font-size: 24px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            width: 150px;
            text-align: center;
        }

        #btn-auto {
            background-color: #f59e0b; /* Màu cam */
            font-size: 24px;
            padding: 15px 20px;
            min-width: 200px;
            flex: none;
        }

        #btn-auto:hover {
            background-color: #d97706;
        }

        #btn-auto.active {
            background-color: #ef4444; /* Chuyển màu đỏ khi đang chạy */
        }

        #result-display {
            font-size: 45px;
            font-weight: bold;
            color: #ef4444;
            min-height: 60px;
            text-align: center;
            margin-bottom: 50px;
        }
    </style>
</head>
<body>

    <h2>Luyện Tập Đọc Nốt Nhạc (Khóa Son)</h2>

    <div class="staff-container" id="staff">
        </div>

    <div class="controls">
        <button id="btn-generate" onclick="generateRandomNote()">Tạo nốt nhạc</button>
        <button id="btn-result" onclick="showResult()">Xem kết quả</button>
    </div>

    <div class="auto-controls">
        <label for="interval-input" style="font-size: 24px; font-weight: bold;">Chuyển sau:</label>
        <input type="number" id="interval-input" placeholder="số giây" min="1" step="0.5" value="2">
        <span style="font-size: 24px; font-weight: bold;">giây</span>
        <button id="btn-auto" onclick="toggleAutoPlay()">Tự động chuyển</button>
    </div>

    <div id="result-display"></div>

    <script>
        const noteNames = [
            'Đô', 'Si', 'La', 'Sol', 'Fa', 'Mi', 'Rê', 'Đô', 
            'Si', 'La', 'Sol', 'Fa', 'Mi', 'Rê', 'Đô', 'Si', 'La'
        ];

        let currentNoteIndex = -1;
        let autoPlayInterval = null; // Biến lưu trữ vòng lặp tự động

        function initStaff() {
            const staffContainer = document.getElementById('staff');
            let html = '<div class="clef">&#119070;</div>'; 
            
            for (let i = 0; i < 17; i++) {
                if (i % 2 === 0) {
                    const isMainLine = [4, 6, 8, 10, 12].includes(i);
                    html += `<div class="row line ${isMainLine ? 'main-line' : ''}" id="pos-${i}"></div>`;
                } else {
                    html += `<div class="row space" id="pos-${i}"></div>`;
                }
            }
            staffContainer.innerHTML = html;
        }

        function generateRandomNote() {
            if (currentNoteIndex !== -1) {
                document.getElementById(`pos-${currentNoteIndex}`).innerHTML = '';
            }

            document.getElementById('result-display').innerText = '';

            currentNoteIndex = Math.floor(Math.random() * 17);

            const stemDirection = currentNoteIndex <= 8 ? 'stem-down' : 'stem-up';
            
            const noteHtml = `<div class="note ${stemDirection}"></div>`;
            document.getElementById(`pos-${currentNoteIndex}`).innerHTML = noteHtml;
        }

        function showResult() {
            if (currentNoteIndex !== -1) {
                const noteName = noteNames[currentNoteIndex];
                document.getElementById('result-display').innerText = `Đáp án: ${noteName}`;
            } else {
                document.getElementById('result-display').innerText = 'Hãy bấm "Tạo nốt nhạc"!';
            }
        }

        // --- Hàm xử lý tính năng tự động mới ---
        function toggleAutoPlay() {
            const btnAuto = document.getElementById('btn-auto');
            const inputElement = document.getElementById('interval-input');

            // Nếu đang chạy tự động thì dừng lại
            if (autoPlayInterval !== null) {
                clearInterval(autoPlayInterval);
                autoPlayInterval = null;
                btnAuto.innerText = "Tự động chuyển";
                btnAuto.classList.remove('active');
                inputElement.disabled = false; // Cho phép sửa số giây
            } 
            // Nếu chưa chạy thì bắt đầu
            else {
                const k = parseFloat(inputElement.value);
                
                // Kiểm tra xem dữ liệu nhập vào có hợp lệ không
                if (isNaN(k) || k <= 0) {
                    alert("Vui lòng nhập số giây hợp lệ (lớn hơn 0)!");
                    return;
                }

                // Chạy ngay lập tức 1 lần trước khi vào vòng lặp
                generateRandomNote();

                // Thiết lập vòng lặp chạy sau mỗi k giây (chuyển đổi giây sang mili giây)
                autoPlayInterval = setInterval(() => {
                    generateRandomNote();
                }, k * 1000);

                // Cập nhật giao diện nút
                btnAuto.innerText = "Dừng tự động";
                btnAuto.classList.add('active');
                inputElement.disabled = true; // Khóa ô nhập liệu khi đang chạy
            }
        }

        window.onload = initStaff;
    </script>
</body>
</html>
